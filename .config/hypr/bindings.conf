# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omadora-cmd-terminal-cwd)"
bindd = SUPER SHIFT, E, File Explorer, exec, uwsm-app -- nautilus --new-window
bindd = SUPER SHIFT, B, Browser, exec, omadora-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omadora-launch-browser --private
bindd = SUPER SHIFT, N, Editor, exec, omadora-launch-editor

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, M, Google Maps, exec, omadora-launch-webapp "https://maps.google.com/"
bindd = SUPER SHIFT, A, ChatGPT, exec, omadora-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omadora-launch-webapp "https://youtube.com/"

# Overwrite existing bindings, like putting Omadora Menu on Super + Space
unbind = SUPER, SPACE
bindd = SUPER, SPACE, Omadora menu, exec, omadora-menu

# Jump straight to app search (skip the menu)
bindd = SUPER, A, Search apps, exec, wofi --show drun --lines 8 -p "Launch…"

# Unbind and remap defaults for vim keys
unbind = SUPER, J
unbind = SUPER, K
bindd = SUPER CTRL, K, Show key bindings, exec, omadora-menu-keybindings
unbind = SUPER, W
bindd = SUPER, Q, Close window, killactive,
unbind = SUPER, T
bindd = SUPER, V, Toggle window split, layoutmsg, togglesplit
unbind = SUPER, F
bindd = SUPER, F, Toggle window floating/tiling, togglefloating,
unbind = SUPER SHIFT, F
bindd = SUPER SHIFT, F, Maximize (keep border/gaps), fullscreen, 1
bindd = SUPER, H, Move window focus left, movefocus, l
bindd = SUPER, L, Move window focus right, movefocus, r
bindd = SUPER, K, Move window focus up, movefocus, u
bindd = SUPER, J, Move window focus down, movefocus, d
bindd = SUPER SHIFT, H, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, L, Swap window to the right, swapwindow, r
bindd = SUPER SHIFT, K, Swap window up, swapwindow, u
bindd = SUPER SHIFT, J, Swap window down, swapwindow, d

# Vim keys for switching tabs within a window group
bindd = ALT SHIFT, L, Next tab in group, changegroupactive, f
bindd = ALT SHIFT, H, Previous tab in group, changegroupactive, b

# Resize mode: SUPER + R, then h/j/k/l to resize, Esc to exit
bind = SUPER, R, submap, resize
submap = resize
binde = , H, resizeactive, -50 0
binde = , L, resizeactive, 50 0
binde = , K, resizeactive, 0 -50
binde = , J, resizeactive, 0 50
bind = , escape, submap, reset
bind = , return, submap, reset
submap = reset
