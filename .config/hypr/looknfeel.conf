# Change the default look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 5
    border_size = 2

    # Use master layout instead of dwindle
    # layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Use round window corners
    rounding = 10

    # Slightly transparent + dimmed inactive windows
    active_opacity = 1.0
    inactive_opacity = 0.92
    dim_inactive = true
    dim_strength = 0.1

    # Deeper shadows for floating windows
    shadow {
        range = 8
        render_power = 3
    }

    # Frostier "glass" blur
    blur {
        size = 5
        passes = 3
        new_optimizations = true
        vibrancy = 0.17
    }
}

# https://wiki.hypr.land/Configuring/Dwindle-Layout/
dwindle {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    # enabled = false

    # Smooth slide when switching workspaces (Omadora disables this by default)
    animation = workspaces, 1, 5, easeOutQuint, slide
}

# (Smart gaps removed — single/maximized windows keep border, rounding, and outer padding)
